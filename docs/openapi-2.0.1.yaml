openapi: 3.0.3
info:
  title: DentiCore 2.0 API REST
  description: Contrato de servicios para el proyecto DENTICORE. Arquitectura basada en Spring Boot y PostgreSQL.
  version: 2.0.1
servers:
  - url: http://localhost:8080/api/v1

paths:
  # ==========================================
  # MÓDULO DE AUTENTICACIÓN Y SEGURIDAD
  # ==========================================
  /auth/login:
    post:
      summary: Autenticación de Usuario (Generación JWT)
      tags: [Seguridad]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Autenticación exitosa.

  # ==========================================
  # MÓDULO DE CATÁLOGO (Público)
  # ==========================================
  /catalogo/especialidades:
    get:
      summary: Listar Especialidades Activas
      tags: [Catálogo]
      responses:
        '200':
          description: Lista de especialidades.

  # ==========================================
  # MÓDULO DE USUARIOS (Soporte CRM)
  # ==========================================
  /usuarios/odontologos/activos:
    get:
      summary: Listar Odontólogos activos
      tags: [Usuarios Soporte]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista ligera para Combobox.
          
  /usuarios/pacientes/activos:
    get:
      summary: Listar Pacientes activos
      tags: [Usuarios Soporte]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista ligera para Combobox.

  # ==========================================
  # MÓDULO DE CITAS Y AGENDAMIENTO (Protegido)
  # ==========================================
  /citas:
    post:
      summary: Agendar nueva Cita
      description: Bloquea el cupo concurrentemente, valida cruces de horario e inserta la cita. Emite evento a RabbitMQ.
      tags: [CRM y Agenda]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CitaRequestDTO'
      responses:
        '201':
          description: Cita creada exitosamente.
        '409':
          description: Conflicto - Horario ocupado.

  # ==========================================
  # MÓDULO CLÍNICO TRANSACCIONAL
  # ==========================================
  /clinica/odontograma:
    post:
      summary: Registrar Odontograma y Detalles
      description: Transacción ACID que registra cabecera y detalles en la BD.
      tags: [Clínica]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuardarOdontogramaRequest'
      responses:
        '201':
          description: Transacción exitosa.

  # ==========================================
  # MÓDULO DE VENTAS (Motor de Cobros)
  # ==========================================
  /ventas/procesar:
    post:
      summary: Procesar Transacción Comercial
      description: Genera la cabecera y el detalle de la venta.
      tags: [Ventas y Facturación]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcesarVentaRequest'
      responses:
        '200':
          description: Transacción comercial procesada exitosamente.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required: [dni, password]
      properties:
        dni:
          type: string
        password:
          type: string
          
    CitaRequestDTO:
      type: object
      required: [idOdontologo, fechaHora, canalOrigen]
      properties:
        idPaciente:
          type: integer
        idOdontologo:
          type: integer
        fechaHora:
          type: string
          format: date-time
        canalOrigen:
          type: string
        montoAdelanto:
          type: number
          default: 0.0
        referenciaAdelanto:
          type: string
          
    GuardarOdontogramaRequest:
      type: object
      properties:
        idAtencionClinica:
          type: integer
          
    ProcesarVentaRequest:
      type: object
      properties:
        idCita:
          type: integer